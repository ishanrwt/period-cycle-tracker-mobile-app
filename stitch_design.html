<style>body { background-color: #FDFBF7; }
        .hexagon-ring {
            width: 240px;
            height: 240px;
            background: conic-gradient(
                #E8B4B8 0deg 90deg,   /* Menstruation - Dusty Pink */
                #B8CBD0 90deg 180deg, /* Follicular - Powder Blue */
                #A8B5A2 180deg 270deg, /* Ovulation - Sage Green */
                #D8C9B0 270deg 360deg  /* Luteal - Warm Taupe */
            );
            clip-path: polygon(50% 0%, 93.3% 25%, 93.3% 75%, 50% 100%, 6.7% 75%, 6.7% 25%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hexagon-inner {
            width: 192px;
            height: 192px;
            background-color: #FDFBF7;
            clip-path: polygon(50% 0%, 93.3% 25%, 93.3% 75%, 50% 100%, 6.7% 75%, 6.7% 25%);
            position: absolute;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
        }
        .indicator-hex {
            position: absolute;
            width: 16px;
            height: 16px;
            background-color: white;
            border-radius: 50%;
            /* Positioned roughly at the middle of the Ovulation edge */
            left: 6.7%;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(168, 181, 162, 0.8);
            z-index: 10;
        }</style>
